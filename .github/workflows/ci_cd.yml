name: Cortex CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        python -m flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check standard style guidelines
        python -m flake8 src/ tests/ --count --statistics

    - name: Run Pytest Suite
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Run Handover Package Compilation Test
      run: |
        python -m scratch.compile_handover
        if [ ! -f handover_package.zip ]; then echo "Handover ZIP not created!"; exit 1; fi
