# Cortex — configs/prometheus.yml
# Scrape configuration for all platform services.
# Grafana connects to Prometheus as a datasource.

global:
  scrape_interval:     15s    # how often to scrape
  evaluation_interval: 15s    # how often to evaluate rules
  external_labels:
    environment: production
    app: cortex

# ── Alerting (wire up Alertmanager when ready) ────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # add: ["alertmanager:9093"]

# ── Rule files ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI (prometheus-fastapi-instrumentator exposes /metrics)
  - job_name: cortex_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: cortex_api

  # Celery worker (via celery-exporter sidecar — add to compose when ready)
  - job_name: celery_worker
    static_configs:
      - targets: ["celery-exporter:9808"]

  # PostgreSQL (via postgres_exporter sidecar)
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis (via redis_exporter sidecar)
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Nginx (via nginx-prometheus-exporter sidecar)
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
