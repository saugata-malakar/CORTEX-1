# Cortex — docker-compose.yml
# Dev-first, prod-promotable stack.
# All services share one bridge network.
# Secrets via .env — never hardcoded.
#
# Usage:
#   docker compose up -d              # start full stack
#   docker compose up -d api worker   # start subset
#   docker compose logs -f api        # tail specific service
#   docker compose exec api bash      # shell into container

version: "3.9"

# ─── Shared defaults ────────────────────────────────────────────────────────
x-api-common: &api-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks: [cortex]
  restart: unless-stopped

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cortex_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortexpass}
      POSTGRES_DB:       ${POSTGRES_DB:-cortex_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [cortex]
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cortex_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cortex]
    restart: unless-stopped

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    <<: *api-common
    container_name: cortex_api
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
      --access-log
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api:ro
      - inspection_uploads:/tmp/cortex_uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    <<: *api-common
    container_name: cortex_worker
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=pipeline,default
      --hostname=worker@%h
    volumes:
      - ./workers:/app/workers:ro
      - inspection_uploads:/tmp/cortex_uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping -d worker@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Beat (scheduled tasks) ─────────────────────────────────────────
  beat:
    <<: *api-common
    container_name: cortex_beat
    command: >
      celery -A workers.celery_app beat
      --loglevel=info
      -s /tmp/celerybeat-schedule
    volumes:
      - ./workers:/app/workers:ro

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cortex_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/out:/var/www/frontend:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on: [api]
    networks: [cortex]
    restart: unless-stopped

  # ── Flower (Celery UI) ────────────────────────────────────────────────────
  flower:
    <<: *api-common
    container_name: cortex_flower
    command: >
      celery -A workers.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flowerpass}
    ports:
      - "5555:5555"

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cortex_prometheus
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    networks: [cortex]
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: cortex_grafana
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafanapass}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [cortex]
    restart: unless-stopped

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  inspection_uploads:

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  cortex:
    driver: bridge
