# Cortex — nginx/nginx.conf
# Production-grade reverse proxy.
#
# Responsibilities:
#   - TLS termination (certs from Let's Encrypt / Cloudflare origin cert)
#   - Rate limiting (outer layer — Redis rate limiter is inner layer in FastAPI)
#   - Gzip compression for API + static assets
#   - Static frontend file serving (avoids hitting FastAPI for HTML/JS/CSS)
#   - Upstream health-check aware routing
#   - Security headers

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"req_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$request_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 500M;      # allow large UAV image uploads
    server_tokens off;              # hide Nginx version

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json application/javascript
        application/x-javascript text/xml application/xml
        application/geo+json image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Outer nginx rate limit (burst-tolerant) — coarse protection
    # Inner Redis sliding-window limit in FastAPI — precise per-user limit
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:5m rate=5r/m;
    limit_req_status 429;

    # ── Upstream: FastAPI ─────────────────────────────────────────────────────
    upstream cortex_api {
        server api:8000 fail_timeout=10s max_fails=3;
        keepalive 32;
    }

    # ── (Removed duplicate request_id map) ────────────────────────────────────

    # ── Main HTTP server (Localhost) ──────────────────────────────────────────
    server {
        listen 80;
        server_name localhost _;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"        always;
        add_header X-Frame-Options          "SAMEORIGIN"     always;
        add_header X-XSS-Protection         "1; mode=block"  always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        add_header X-Request-ID             $request_id      always;

        # ── Auth endpoints (stricter rate limit) ─────────────────────────────
        location ~ ^/api/v1/auth/(login|register) {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://cortex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── API endpoints ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://cortex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeout for pipeline status polling
            proxy_read_timeout 120s;
        }

        # ── Prometheus metrics (internal only) ───────────────────────────────
        location /metrics {
            allow 10.0.0.0/8;      # internal network only
            allow 172.16.0.0/12;
            deny  all;
            proxy_pass http://cortex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Static frontend ───────────────────────────────────────────────────
        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # No cache for index.html (SPA entry point)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # ── (Removed Tile server proxy due to missing upstream) ───────────────

        # ── Health (no rate limit, no auth) ───────────────────────────────────
        location = /api/v1/health {
            proxy_pass http://cortex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            access_log off;
        }
    }
}
